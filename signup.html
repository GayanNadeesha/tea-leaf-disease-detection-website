<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Tea Leaf System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Tea Leaf Logo" />
      <span>Tea Leaf</span>
    </div>
  </header>

  <main class="hero">
    <div class="hero-image">
      <img src="images/1 (1).jpg" alt="Tea Leaf Image" />
    </div>
    <div class="signup-form">
      <h2>Sign Up</h2>
      <form id="registerForm">
        <input type="text" id="fullname" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="tel" id="phone" placeholder="Phone number" pattern="\d{10}" maxlength="10" required />
        <input type="password" id="password" placeholder="Password" required />
        <input type="password" id="confirmPassword" placeholder="Confirm password" required />
        <p class="login-link">Already have an account? → <a href="login.html">Login</a></p>
        <button type="submit">Sign Up</button>
        <p id="error-msg" style="color: red;"></p>
      </form>
    </div>
  </main>

  <!-- Modal -->
  <div id="successModal">
    <div id="successModalContent">
      <h3>Registration Successful!</h3>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Link external JS -->
  <script src="sign up.js"></script>
</body>
</html>
